# ???????????????
spring.application.name=nongcetong
spring.profiles.active=dev  # ?????????dev??

# ?????
server.port=8080
server.servlet.context-path=/nongcetong

# Spring  MySQL 8.0.35
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/nongcetong_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# MyBatis config
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.nongcetong.nongcetongbackend.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# log config
logging.level.com.nongcetong=debug
logging.level.org.springframework.web=info

# JWT??
jwt.secret=nongcetong-ai-secret-key-2026
jwt.expiration=604800000